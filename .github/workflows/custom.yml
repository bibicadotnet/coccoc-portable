name: Cốc Cốc Portable Debloat

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  packages: write

jobs:
  check-and-build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Download and Extract CocCoc
      id: coccoc-install
      shell: powershell
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        $updateUrl = "https://update.coccoc.com/service/update2/json"
        $body = '{"request":{"@os":"win","@updater":"CocCocUpdater","acceptformat":"crx3,download","protocol":"4.0","os":{"arch":"x86_64","platform":"Windows","version":"10.0"},"updaterversion":"148.0.7778.254","apps":[{"appid":"{C0CC0CBB-47DD-46FF-A04D-7011A06486E1}","version":"0.0.0.0","ap":"arch_x64","updatecheck":{}}]}}'
        $headers = @{
            "User-Agent" = "CocCocUpdater/148.0.7778.254"
            "Accept"     = "application/json"
        }

        $nextVersion = ""

        try {
          Write-Host "Querying for the latest CocCoc version..." -ForegroundColor Yellow
          $resp = Invoke-WebRequest -Uri $updateUrl -Method POST -Body $body -ContentType "application/json" -Headers $headers -UseBasicParsing
          
          $rawContent = $resp.Content
          if ($rawContent.StartsWith(")]}'")) { $rawContent = $rawContent.Substring(4) }
          $json = $rawContent | ConvertFrom-Json
          $updateCheck = $json.response.apps[0].updatecheck

          if ($updateCheck.status -eq "ok") {
              $nextVersion = $updateCheck.nextversion
          } else {
              Write-Host "CocCoc query error: $($updateCheck.status). Proceeding to fallback..." -ForegroundColor Yellow
          }
        } catch {
          Write-Host "Processing error: $($_.Exception.Message). Proceeding to fallback..." -ForegroundColor Yellow
        }

        if (-not $nextVersion) {
            $nextVersion = "149.0.7827.206"
            Write-Host "Using fallback version: $nextVersion" -ForegroundColor Yellow
        }

        $directExeUrl = "https://files2.coccoc.com/apps/browser/win/x64/$nextVersion/$($nextVersion)_coccocsetup.exe"
        Write-Host "Found/Target version: $nextVersion" -ForegroundColor Cyan
        Write-Host "Direct download link: $directExeUrl" -ForegroundColor Green

        # Create a temporary directory for extraction
        $tempDir = "$env:TEMP\coccoc_dl"
        New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
        $installerPath = "$tempDir\coccocsetup.exe"
        
        Write-Host "Downloading the installer..." -ForegroundColor Yellow
        (New-Object System.Net.WebClient).DownloadFile($directExeUrl, $installerPath)

        # Use 7-Zip available on Github Actions windows-latest to extract the .exe
        Write-Host "Extracting the exe file..." -ForegroundColor Yellow
        & "C:\Program Files\7-Zip\7z.exe" x $installerPath "-o$tempDir\ext1" -y | Out-Null

        # Find and extract the inner .7z file (standard Chromium Installer structure)
        $sevenZFile = Get-ChildItem -Path "$tempDir\ext1" -Filter "*.7z" | Select-Object -First 1
        if ($sevenZFile) {
            Write-Host "Found $($sevenZFile.Name), continuing extraction..." -ForegroundColor Yellow
            & "C:\Program Files\7-Zip\7z.exe" x $sevenZFile.FullName "-o$tempDir\ext2" -y | Out-Null
            $searchPath = "$tempDir\ext2"
        } else {
            $searchPath = "$tempDir\ext1"
        }

        # Scan for browser.exe and move the entire structure to the target directory
        $browserExe = Get-ChildItem -Path $searchPath -Filter "browser.exe" -Recurse | Select-Object -First 1
        if ($browserExe) {
            $sourceAppFolder = $browserExe.Directory.FullName
            $targetAppFolder = "C:\Program Files\CocCoc\Browser\Application"
            
            New-Item -ItemType Directory -Path $targetAppFolder -Force | Out-Null
            Copy-Item -Path "$sourceAppFolder\*" -Destination $targetAppFolder -Recurse -Force
            Write-Host "Successfully extracted CocCoc structure to: $targetAppFolder" -ForegroundColor Green
        } else {
            Write-Error "browser.exe not found in the extracted package!"
            exit 1
        }
        
    - name: Get CocCoc version
      id: coccoc-version
      shell: powershell
      run: |
        try {
          $coccocPath = "C:\Program Files\CocCoc\Browser\Application\browser.exe"
          
          if (-not (Test-Path $coccocPath)) {
            Write-Error "CocCoc not found at expected location"
            exit 1
          }
          
          $coccocVersion = (Get-Item $coccocPath).VersionInfo.ProductVersion
          echo "COCCOC_VERSION=$coccocVersion" >> $env:GITHUB_OUTPUT
          Write-Host "CocCoc version: $coccocVersion"
          
          # Remove Installer directory (May not exist due to extraction only, but kept as a precaution)
          $installerPath = "C:\Program Files\CocCoc\Browser\Application\$coccocVersion\Installer"
          if (Test-Path $installerPath) {
            Remove-Item $installerPath -Recurse -Force
            Write-Host "Removed Installer directory"
          }
          
          # Clean up Extensions directory - keep only specified files
          $extensionsPath = "C:\Program Files\CocCoc\Browser\Application\$coccocVersion\Extensions"
          if (Test-Path $extensionsPath) {
            $filesToKeep = @(
              "jdfkmiabjpfjacifcmihfdjhpnjpiick.json",
              "savior.crx"
            )
            
            $allItems = Get-ChildItem $extensionsPath -Force
            foreach ($item in $allItems) {
              if ($item.Name -notin $filesToKeep) {
                Remove-Item $item.FullName -Recurse -Force -ErrorAction SilentlyContinue
                Write-Host "Removed from Extensions: $($item.Name)"
              } else {
                Write-Host "Kept file: $($item.Name)"
              }
            }
          }
          
          # Copy additional extensions from repository to Extensions directory
          $repoExtensionsPath = "$env:GITHUB_WORKSPACE\Extensions"
          $destExtensionsPath = "C:\Program Files\CocCoc\Browser\Application\$coccocVersion\Extensions"
          $filesToCopy = @(
            "google-search-clean.crx",
            "kfjpnijdkpendafdhdaoeoafdnpfdfpk.json"
          )
          foreach ($file in $filesToCopy) {
            $srcFile = "$repoExtensionsPath\$file"
            if (Test-Path $srcFile) {
              Copy-Item -Path $srcFile -Destination $destExtensionsPath -Force
              Write-Host "Copied to Extensions: $file"
            } else {
              Write-Warning "File not found in repo Extensions: $file"
            }
          }
          
          # Remove Dictionaries directory
          $dictionariesPath = "C:\Program Files\CocCoc\Browser\Application\$coccocVersion\Dictionaries"
          if (Test-Path $dictionariesPath) {
            Remove-Item $dictionariesPath -Recurse -Force
            Write-Host "Removed Dictionaries directory"
          }
          
          # Remove additional files and directories
          $itemsToRemove = @(
            "C:\Program Files\CocCoc\Browser\Application\SetupMetrics",
            "C:\Program Files\CocCoc\Browser\Application\browser_proxy.exe",
            "C:\Program Files\CocCoc\Browser\Application\VisualElementsManifest.xml"
          )
          
          foreach ($item in $itemsToRemove) {
            if (Test-Path $item) {
              Remove-Item $item -Recurse -Force -ErrorAction SilentlyContinue
              Write-Host "Removed: $item"
            }
          }
          
        } catch {
          Write-Error "Failed to get CocCoc version: $($_.Exception.Message)"
          exit 1
        }

    - name: Get latest Chrome Next Mini version
      id: chromenextmini-version
      shell: powershell
      run: |
        try {
          $chromeNextRelease = Invoke-RestMethod "https://api.github.com/repos/bibicadotnet/chrome-next-mini/releases/latest"
          $chromeNextVersion = $chromeNextRelease.tag_name
          echo "CHROMENEXTMINI_VERSION=$chromeNextVersion" >> $env:GITHUB_OUTPUT
          Write-Host "Chrome Next Mini version: $chromeNextVersion"
        } catch {
          Write-Error "Failed to get Chrome Next Mini version: $($_.Exception.Message)"
          exit 1
        }
        
    - name: Check if release exists
      id: check-release
      shell: powershell
      run: |
        $releaseTag = "coccoc-portable-x64_${{ steps.coccoc-version.outputs.COCCOC_VERSION }}_${{ steps.chromenextmini-version.outputs.CHROMENEXTMINI_VERSION }}"
        echo "RELEASE_TAG=$releaseTag" >> $env:GITHUB_OUTPUT
        
        try {
          $headers = @{
            'Authorization' = 'token ${{ secrets.GITHUB_TOKEN }}'
            'Accept' = 'application/vnd.github.v3+json'
          }
          $response = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$releaseTag" -Headers $headers -ErrorAction Stop
          echo "RELEASE_EXISTS=true" >> $env:GITHUB_OUTPUT
          Write-Host "Release $releaseTag already exists"
        } catch {
          if ($_.Exception.Response.StatusCode -eq 404) {
            echo "RELEASE_EXISTS=false" >> $env:GITHUB_OUTPUT
            Write-Host "Release $releaseTag does not exist, will create new one"
          } else {
            Write-Error "Error checking release: $($_.Exception.Message)"
            exit 1
          }
        }
        
    - name: Build CocCoc Portable
      if: steps.check-release.outputs.RELEASE_EXISTS == 'false'
      shell: powershell
      run: |
        # Stop any CocCoc processes
        Stop-Process -Name browser,coccoc -Force -ErrorAction SilentlyContinue
        
        Write-Host "Building CocCoc Portable with Chrome Next Mini" -ForegroundColor Green
        
        $releaseTag = "${{ steps.check-release.outputs.RELEASE_TAG }}"
        $rootPath = "$env:GITHUB_WORKSPACE\CocCoc_Portable"
        $portablePath = "$rootPath\CocCoc"
        $tempDir = "$env:TEMP\CocCocBuilder"
        $applicationPath = "C:\Program Files\CocCoc\Browser\Application"
        
        # Get Chrome Next Mini release info
        $chromeNextRelease = Invoke-RestMethod "https://api.github.com/repos/bibicadotnet/chrome-next-mini/releases/latest"
        $chromeNextDownloadUrl = $chromeNextRelease.assets | Where-Object { $_.name -match "edge_portable.*\.zip$" } | Select-Object -First 1 -ExpandProperty browser_download_url
        
        # Prepare directories
        if (Test-Path $tempDir) { Remove-Item $tempDir -Recurse -Force }
        New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
        if (Test-Path $rootPath) { Remove-Item $rootPath -Recurse -Force }
        New-Item -ItemType Directory -Path $rootPath -Force | Out-Null
        New-Item -ItemType Directory -Path $portablePath -Force | Out-Null
        
        # Download Chrome Next Mini
        Write-Host "Downloading Chrome Next Mini..." -ForegroundColor Yellow
        (New-Object System.Net.WebClient).DownloadFile($chromeNextDownloadUrl, "$tempDir\edge_portable.zip")

        # Copy config files from project
        Write-Host "Copying config files..." -ForegroundColor Yellow
        Copy-Item "$env:GITHUB_WORKSPACE\chrome++.ini" "$applicationPath\chrome++.ini" -Force
        Copy-Item "$env:GITHUB_WORKSPACE\update.bat" "$applicationPath\update.bat" -Force
        Copy-Item "$env:GITHUB_WORKSPACE\debloat.reg" "$applicationPath\debloat.reg" -Force
        Copy-Item "$env:GITHUB_WORKSPACE\default-apps-multi-profile.bat" "$applicationPath\default-apps-multi-profile.bat" -Force

        # Extract Chrome Next Mini
        Write-Host "Extracting Chrome Next Mini..." -ForegroundColor Yellow
        $chromeNextExtractDir = "$tempDir\chromenext"
        Expand-Archive -Path "$tempDir\edge_portable.zip" -DestinationPath $chromeNextExtractDir -Force
        
        # Copy Chrome Next Mini files to Application
        Write-Host "Installing Chrome Next Mini..." -ForegroundColor Yellow
        # Find the files dynamically since they are inside a subfolder in the ZIP
        $setdllFile = Get-ChildItem -Path $chromeNextExtractDir -Filter "setdll-x64.exe" -Recurse | Select-Object -First 1
        $versionDllFile = Get-ChildItem -Path $chromeNextExtractDir -Filter "version.dll" -Recurse | Select-Object -First 1
        
        if ($setdllFile -and $versionDllFile) {
            Copy-Item $setdllFile.FullName "$applicationPath\setdll-x64.exe" -Force
            Copy-Item $versionDllFile.FullName "$applicationPath\version.dll" -Force
        } else {
            Write-Error "Could not find setdll-x64.exe or version.dll in the extracted package!"
            exit 1
        }
        
        # Apply Chrome Next Mini
        Write-Host "Applying Chrome Next Mini..." -ForegroundColor Yellow
        Push-Location $applicationPath
        & ".\setdll-x64.exe" /d:version.dll browser.exe | Out-Null
        Pop-Location
        
        # Copy CocCoc files to portable directory
        Write-Host "Copying CocCoc files..." -ForegroundColor Yellow
        Copy-Item "$applicationPath\*" $portablePath -Recurse -Force
        
        # Cleanup temp files and installer files
        Remove-Item $tempDir -Recurse -Force
        Remove-Item "$applicationPath\setdll-x64.exe", "$applicationPath\browser.exe~" -Force -ErrorAction SilentlyContinue
        Remove-Item "$portablePath\setdll-x64.exe", "$portablePath\browser.exe~" -Force -ErrorAction SilentlyContinue
        
        Write-Host "Build completed!" -ForegroundColor Green
        
    - name: Create ZIP archive
      if: steps.check-release.outputs.RELEASE_EXISTS == 'false'
      shell: powershell
      run: |
        $releaseTag = "${{ steps.check-release.outputs.RELEASE_TAG }}"
        $zipPath = "$env:GITHUB_WORKSPACE\$releaseTag.zip"
        $sourcePath = "$env:GITHUB_WORKSPACE\CocCoc_Portable"
        
        Compress-Archive -Path $sourcePath -DestinationPath $zipPath -CompressionLevel Optimal
        Write-Host "Created archive: $zipPath"
        
        # Set output for next step
        echo "ARCHIVE_PATH=$zipPath" >> $env:GITHUB_OUTPUT
      id: create-archive
        
    - name: Create Release and Upload Asset
      if: steps.check-release.outputs.RELEASE_EXISTS == 'false'
      shell: powershell
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $releaseTag = "${{ steps.check-release.outputs.RELEASE_TAG }}"
        $coccocVersion = "${{ steps.coccoc-version.outputs.COCCOC_VERSION }}"
        $chromeNextVersion = "${{ steps.chromenextmini-version.outputs.CHROMENEXTMINI_VERSION }}"
        $archivePath = "${{ steps.create-archive.outputs.ARCHIVE_PATH }}"
        
        # Create release body
        $releaseBody = "**CocCoc Portable with Chrome Next Mini Auto Build**`n`n**CocCoc Version:** $coccocVersion`n**Chrome Next Mini Version:** $chromeNextVersion`n`n## What's Included`n- CocCoc Browser Portable`n- Chrome Next Mini enhancements`n- Pre-configured settings`n`n## Installation`n1. Download the ZIP file`n2. Extract to your desired location`n3. Run CocCoc_Portable\CocCoc\browser.exe`n`n## Update`n1. Run CocCoc_Portable\CocCoc\update.bat`n2. Your settings and chrome++.ini configuration will be preserved`n`n## Features`n- Fully portable - no installation required`n- Enhanced with Chrome Next Mini features`n- Auto-configured for optimal experience`n- Vietnamese browser with international support`n`n---`n*This release was automatically generated by GitHub Actions*"
        
        Write-Host "Creating release: $releaseTag" -ForegroundColor Yellow
        $releaseTitle = "$releaseTag"
        
        gh release create $releaseTag --title $releaseTitle --notes $releaseBody --repo ${{ github.repository }} $archivePath
          
        Write-Host "Release created successfully!" -ForegroundColor Green
        
    - name: Summary
      shell: powershell
      run: |
        if ("${{ steps.check-release.outputs.RELEASE_EXISTS }}" -eq "true") {
          Write-Host "Release ${{ steps.check-release.outputs.RELEASE_TAG }} already exists - skipped" -ForegroundColor Yellow
        } else {
          Write-Host "Successfully created release ${{ steps.check-release.outputs.RELEASE_TAG }}" -ForegroundColor Green
        }
